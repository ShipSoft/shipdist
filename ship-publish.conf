# vim: set filetype=yaml:
---
s3_endpoint_url: https://s3.cern.ch
s3_bucket: ship-packages
base_url: https://s3.cern.ch/swift/v1/ship-packages/
base_prefix: TARS
http_ssl_verify: true
conn_timeout_s: 6.05
conn_retries: 10
conn_dethrottle_s: 0.07

auto_include_deps: true

cvmfs_repository: ship-nightlies.cern.ch
cvmfs_package_dir: /cvmfs/%(repo)s/main/%(arch)s/Packages/%(package)s/%(version)s
cvmfs_modulefile: /cvmfs/%(repo)s/main/%(arch)s/Modules/modulefiles/%(package)s/%(version)s

architectures:
  slc9_x86-64:
    CVMFS: el9-x86_64
    RPM: false
    include:
      FairShip: true
      # Build-only deps not pulled in by auto_include_deps (which
      # follows dist-runtime). These are needed by CVMFSRemoteSync to
      # match hashes for all packages in the dependency tree.
      defaults-release: true
      autotools: true
      uv: true
      FairCMakeModules: true
      ninja: true
      lzma: true
      UUID: true
